<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IT資格クイズ統合サイト 第2弾</title>
  <meta name="description" content="AI、データベース、DevOps、監視系IT資格の4択クイズ統合サイト。各資格180問、ランダム50問出題。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">IT Certification Quiz - Batch 2</p>
      <h1>IT資格クイズ統合サイト 第2弾</h1>
      <p class="lead">AI・データベース・DevOps・監視系。各資格180問からランダム50問を出題。</p>
    </div>
  </header>

  <main class="container">
    <section id="homeView" class="card">
      <div class="section-title">
        <h2>資格一覧</h2>
        <span id="totalInfo" class="badge"></span>
      </div>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="資格名・カテゴリで検索">
        <select id="categoryFilter"><option value="all">すべてのカテゴリ</option></select>
      </div>
      <div id="examGrid" class="exam-grid"></div>
    </section>

    <section id="quizView" class="card hidden">
      <button id="backBtn" class="link-btn">← 資格一覧に戻る</button>
      <div class="quiz-head">
        <div>
          <p id="quizCategory" class="eyebrow"></p>
          <h2 id="quizTitle"></h2>
        </div>
        <div class="score-box">
          <span id="progressText">0 / 50</span>
          <strong id="scoreText">正解 0</strong>
        </div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <article class="question-box">
        <h3 id="questionText"></h3>
        <div id="choices" class="choices"></div>
        <div id="explanation" class="explanation hidden"></div>
      </article>
      <div class="quiz-actions">
        <button id="nextBtn" class="primary hidden">次の問題へ</button>
        <button id="restartBtn" class="secondary hidden">もう一度50問</button>
      </div>
    </section>
  
<section class="container"><div class="card">
